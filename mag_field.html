<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Προσομοίωση Μαγνητικού Πεδίου</title>
</head>
<body>
    <div class="overlay">
        <div class="navbar">
            <a href="index.html">Αρχική</a>
            <a href="#">Προσομοιώσεις</a>
        </div>

        <div class="box">
            <h2>Κίνηση Φορτίου σε Μαγνητικό Πεδίο (2D)</h2>
            <button id="playBtn">Play</button> <button id="resetBtn">Reset</button>
            <br><br>
            
            Τύπος Φορτίου: <select id="qSign"><option value="1">Θετικό (+q)</option><option value="-1">Αρνητικό (-q)</option></select>
            Φορά Πεδίου B: <select id="bDir"><option value="1">Προς τα Μέσα (X)</option><option value="-1">Προς τα Έξω (•)</option></select>
            <br>
            Ένταση B (T): <input type="range" id="bSlider" min="0.5" max="3" value="1.5" step="0.1"> <span id="bVal">1.5</span>
            <br>
            Φορτίο q (μC): <input type="range" id="qSlider" min="1" max="5" value="2" step="0.5"> <span id="qVal">2.0</span>
            <br>
            Ταχύτητα v₀ (m/s): <input type="range" id="vSlider" min="10" max="40" value="25" step="1"> <span id="vVal">25</span>
            <br>
            Μάζα m (kg): <input type="range" id="mSlider" min="1" max="5" value="2" step="0.5"> <span id="mVal">2.0</span>
            <br>
            Ύψος Εισόδου y_in (m): <input type="range" id="yInSlider" min="50" max="350" value="200" step="10"> <span id="yInVal">200</span>
            <br><br>
            
            <canvas id="simCanvas" width="650" height="480"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const xMinPixels = 100, xMaxPixels = 600, yMinPixels = 30, yMaxPixels = 430;
        let x, y, vx, vy, isPlaying = false, trajectory = [];
        
        const bSlider = document.getElementById('bSlider'), qSlider = document.getElementById('qSlider');
        const vSlider = document.getElementById('vSlider'), mSlider = document.getElementById('mSlider');
        const yInSlider = document.getElementById('yInSlider');
        
        function initPhysics() {
            x = 50; y = yMaxPixels - parseFloat(yInSlider.value); vx = parseFloat(vSlider.value); vy = 0; 
            trajectory = []; isPlaying = false;
            document.getElementById('bVal').innerText = bSlider.value;
            document.getElementById('qVal').innerText = qSlider.value;
            document.getElementById('vVal').innerText = vSlider.value;
            document.getElementById('mVal').innerText = mSlider.value;
            document.getElementById('yInVal').innerText = yInSlider.value;
        }

        document.getElementById('playBtn').onclick = () => { isPlaying = !isPlaying; };
        document.getElementById('resetBtn').onclick = initPhysics;
        [bSlider, qSlider, vSlider, mSlider, yInSlider].forEach(el => el.oninput = initPhysics);

        function loop() {
            let B = parseFloat(bSlider.value), q = parseFloat(qSlider.value), m = parseFloat(mSlider.value);
            if (isPlaying) {
                let dt = 0.05;
                if (x >= xMinPixels && x <= xMaxPixels && y >= yMinPixels && y <= yMaxPixels) {
                    vx += -(q * vy * B) / m * dt; vy += (q * vx * B) / m * dt;
                }
                x += vx * dt; y += vy * dt;
                trajectory.push({x: x, y: y});
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeRect(xMinPixels, yMinPixels, xMaxPixels - xMinPixels, yMaxPixels - yMinPixels);
            ctx.beginPath(); ctx.arc(x, y, 5, 0, 2 * Math.PI); ctx.fill();
            requestAnimationFrame(loop);
        }
        initPhysics();
        loop();
    </script>
</body>
</html>
