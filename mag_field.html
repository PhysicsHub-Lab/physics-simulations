<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Προσομοίωση Δύναμης Lorentz - PhysicsHub</title>
    <style>
        /* Background & Overlay */
        body { margin: 0; padding: 0; background: url('math1.jpg') fixed center; background-size: cover; font-family: sans-serif; }
        .overlay { background-color: rgba(255, 255, 255, 0.6); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }

        /* Μενού 2 επιπέδων */
        .navbar { background-color: #ffc0cb; display: flex; align-items: center; border-radius: 20px; padding: 5px 10px; margin-bottom: 20px; align-self: flex-start; margin-left: 20px; }
        .navbar a, .navbar .dropbtn { color: #555; padding: 12px 20px; text-decoration: none; font-weight: bold; cursor: pointer; border-radius: 15px; }
        .navbar a:hover { color: white; background-color: #ff85a2; }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; background-color: white; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1000; border-radius: 10px; }
        .dropdown:hover > .dropdown-content { display: block; }

        .nested-menu { position: relative; }
        .nested-menu .dropdown-content { left: 100%; top: 0; }
        .nested-menu:hover > .dropdown-content { display: block; }

        .dropdown-content a { color: #d63384; padding: 12px; display: block; text-decoration: none; }
        .dropdown-content a:hover { background-color: #ffe6eb; }

        /* Simulation Style */
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px; width: 620px; border: 1px solid #ddd; }
        .btn-container { grid-column: span 3; display: flex; justify-content: center; gap: 15px; margin-bottom: 5px; }
        canvas { border: 1px solid #ccc; background: #fff; border-radius: 8px; }
        label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; font-weight: 500; }
        .slider-container { display: flex; align-items: center; gap: 8px; }
        span { font-weight: bold; min-width: 30px; }
        select { padding: 4px; font-weight: bold; width: 100%; border-radius: 4px; border: 1px solid #ccc; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="navbar">
            <a href="index.html">Αρχική</a>
            <div class="dropdown">
                <a href="#" class="dropbtn">Τυπολόγιο ▼</a>
                <div class="dropdown-content">
                    <div class="nested-menu">
                        <a href="#">Γυμνάσιο ▶</a>
                        <div class="dropdown-content">
                            <a href="typologiaAgymn.html">Α' Γυμνασίου</a>
                            <a href="typologiaBgymn.html">Β' Γυμνασίου</a>
                            <a href="typologiaGgymn.html">Γ' Γυμνασίου</a>
                        </div>
                    </div>
                    <div class="nested-menu">
                        <a href="#">Λύκειο ▶</a>
                        <div class="dropdown-content">
                            <a href="typologiaAlyk.html">Α' Λυκείου</a>
                            <a href="typologiaBlyk.html">Β' Λυκείου</a>
                            <a href="typologiaGlyk.html">Γ' Λυκείου</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="dropdown">
                <a class="dropbtn">Προσομοιώσεις ▼</a>
                <div class="dropdown-content">
                    <a href="oscilator.html">Απλή Αρμονική Ταλάντωση</a>
                    <a href="Krouseis.html">Κρούσεις</a>
                    <a href="mag_field.html">Μαγνητικό Πεδίο</a>
                </div>
            </div>
            <a href="#">Έξτρα Υλικό</a>
        </div>

        <h2>Κίνηση Φορτίου σε Μαγνητικό Πεδίο (2D)</h2>
        <div class="controls">
            <div class="btn-container">
                <button id="playBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Play</button>
                <button id="resetBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Reset</button>
            </div>
            <label>Τύπος Φορτίου: <select id="qSign"><option value="1">Θετικό (+q)</option><option value="-1">Αρνητικό (-q)</option></select></label>
            <label>Φορά Πεδίου B: <select id="bDir"><option value="1">Προς τα Μέσα (X)</option><option value="-1">Προς τα Έξω (•)</option></select></label>
            <label>Ένταση B (T): <div class="slider-container"><input type="range" id="bSlider" min="0.5" max="3" value="1.5" step="0.1"><span id="bVal">1.5</span></div></label>
            <label>Φορτίο q (μC): <div class="slider-container"><input type="range" id="qSlider" min="1" max="5" value="2" step="0.5"><span id="qVal">2.0</span></div></label>
            <label>Ταχύτητα v₀ (m/s): <div class="slider-container"><input type="range" id="vSlider" min="10" max="40" value="25" step="1"><span id="vVal">25</span></div></label>
            <label>Μάζα m (kg): <div class="slider-container"><input type="range" id="mSlider" min="1" max="5" value="2" step="0.5"><span id="mVal">2.0</span></div></label>
            <label style="grid-column: span 3; color: blue; font-weight: bold;">Ύψος Εισόδου y_in (m): <div class="slider-container"><input type="range" id="yInSlider" min="50" max="350" value="200" step="10"><span id="yInVal">200</span></div></label>
        </div>

        <canvas id="simCanvas" width="650" height="480"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const xMinPixels = 100, xMaxPixels = 600, yMinPixels = 30, yMaxPixels = 430;
        let x, y, vx, vy, t = 0, isPlaying = false, trajectory = [];
        const playBtn = document.getElementById('playBtn'), resetBtn = document.getElementById('resetBtn');
        const qSignSelect = document.getElementById('qSign'), bDirSelect = document.getElementById('bDir');
        const bSlider = document.getElementById('bSlider'), qSlider = document.getElementById('qSlider');
        const vSlider = document.getElementById('vSlider'), mSlider = document.getElementById('mSlider');
        const yInSlider = document.getElementById('yInSlider');

        function initPhysics() {
            x = 50; y = yMaxPixels - parseFloat(yInSlider.value); vx = parseFloat(vSlider.value); vy = 0; t = 0; trajectory = []; isPlaying = false; playBtn.innerText = "Play";
            document.getElementById('bVal').innerText = parseFloat(bSlider.value).toFixed(1);
            document.getElementById('qVal').innerText = parseFloat(qSlider.value).toFixed(1);
            document.getElementById('vVal').innerText = vSlider.value;
            document.getElementById('mVal').innerText = parseFloat(mSlider.value).toFixed(1);
            document.getElementById('yInVal').innerText = yInSlider.value;
        }

        playBtn.onclick = () => { isPlaying = !isPlaying; playBtn.innerText = isPlaying ? "Pause" : "Play"; };
        resetBtn.onclick = initPhysics;
        [qSignSelect, bDirSelect, bSlider, qSlider, vSlider, mSlider, yInSlider].forEach(el => el.onchange = el.oninput = initPhysics);

        function drawArrow(fromX, fromY, toX, toY, color, lineWidth = 2) {
            let headlen = 10, dx = toX - fromX, dy = toY - fromY, angle = Math.atan2(dy, dx);
            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = lineWidth;
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(toX, toY); ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6)); ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6)); ctx.fill();
        }

        initPhysics();

        function loop() {
            let B = parseFloat(bSlider.value) * parseInt(bDirSelect.value), q = parseFloat(qSlider.value) * parseInt(qSignSelect.value), m = parseFloat(mSlider.value);
            if (isPlaying) {
                let dt = 0.05;
                if (x >= xMinPixels && x <= xMaxPixels && y >= yMinPixels && y <= yMaxPixels) {
                    vx += -(q * vy * B) / m * dt; vy += (q * vx * B) / m * dt;
                }
                x += vx * dt; y += vy * dt; t += dt;
                trajectory.push({x: x, y: y});
                if (x > canvas.width || x < 0 || y > canvas.height || y < 0) { isPlaying = false; playBtn.innerText = "Play"; }
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
            ctx.strokeRect(xMinPixels, yMinPixels, xMaxPixels - xMinPixels, yMaxPixels - yMinPixels);
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.25)'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
            for (let px = xMinPixels + 40; px < xMaxPixels; px += 80) for (let py = yMinPixels + 40; py < yMaxPixels; py += 80) ctx.fillText((B > 0) ? "X" : "•", px, py);
            
            drawArrow(xMinPixels, yMaxPixels, xMinPixels, yMinPixels - 15, 'black', 2);
            drawArrow(xMinPixels, yMaxPixels, xMaxPixels + 15, yMaxPixels, 'black', 2);
            ctx.fillStyle = 'black'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
            for (let offset = 0; offset <= 500; offset += 100) { let tx = xMinPixels + offset; ctx.beginPath(); ctx.moveTo(tx, yMaxPixels); ctx.lineTo(tx, yMaxPixels + 4); ctx.stroke(); ctx.fillText(offset + "m", tx, yMaxPixels + 18); }
            ctx.textAlign = 'right';
            for (let offset = 0; offset <= 400; offset += 100) { let ty = yMaxPixels - offset; ctx.beginPath(); ctx.moveTo(xMinPixels, ty); ctx.lineTo(xMinPixels - 4, ty); ctx.stroke(); ctx.fillText(offset + "m", xMinPixels - 8, ty + 4); }
            
            if (x > 0 && x < canvas.width) {
                drawArrow(x, y, x + vx * 1.5, y + vy * 1.5, 'blue');
                if (x >= xMinPixels && x <= xMaxPixels && y >= yMinPixels && y <= yMaxPixels) {
                    let Fx = -(vy * B) * 2.0 * (q < 0 ? -1 : 1), Fy = (vx * B) * 2.0 * (q < 0 ? -1 : 1);
                    drawArrow(x, y, x + Fx, y + Fy, 'red');
                }
            }

            ctx.strokeStyle = 'black'; ctx.lineWidth = 2.5; ctx.beginPath();
            if(trajectory.length > 0) { ctx.moveTo(trajectory[0].x, trajectory[0].y); for(let p of trajectory) ctx.lineTo(p.x, p.y); ctx.stroke(); }
            ctx.beginPath(); ctx.arc(x, y, 9, 0, 2 * Math.PI); ctx.fillStyle = 'black'; ctx.fill();
            
            ctx.fillStyle = 'blue'; ctx.fillText("➔ Ταχύτητα (v)", 450, 20);
            ctx.fillStyle = 'red'; ctx.fillText("➔ Δύναμη Lorentz (F)", 450, 43);
            
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
