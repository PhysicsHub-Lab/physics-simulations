<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Προσομοίωση Κρούσεων - PhysicsHub</title>
    <style>
        /* Background & Overlay */
        body { margin: 0; padding: 0; background: url('math1.jpg') fixed center; background-size: cover; font-family: sans-serif; }
        .overlay { background-color: rgba(255, 255, 255, 0.6); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }

        /* Μενού 2 επιπέδων */
        .navbar { background-color: #800020; display: flex; align-items: center; border-radius: 20px; padding: 5px 10px; margin-bottom: 20px; align-self: flex-start; margin-left: 20px; }
        .navbar a, .navbar .dropbtn { color: #ffffff; padding: 12px 20px; text-decoration: none; font-weight: bold; cursor: pointer; border-radius: 15px; }
        .navbar a:hover { color: white; background-color: #ff85a2; }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; background-color: white; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1000; border-radius: 10px; }
        .dropdown:hover > .dropdown-content { display: block; }

        .nested-menu { position: relative; }
        .nested-menu .dropdown-content { left: 100%; top: 0; }
        .nested-menu:hover > .dropdown-content { display: block; }

        .dropdown-content a { color: #800020; padding: 12px; display: block; text-decoration: none; }
        .dropdown-content a:hover { background-color: #fdf2f2; }

        /* Simulation Style */
        .controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px; width: 550px; border: 1px solid #ddd; }
        canvas { border: 1px solid #ccc; background: #fff; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="navbar">
            <a href="index.html">Αρχική</a>
            <div class="dropdown">
                <a href="#" class="dropbtn">Τυπολόγιο ▼</a>
                <div class="dropdown-content">
                    <div class="nested-menu">
                        <a href="#">Γυμνάσιο ▶</a>
                        <div class="dropdown-content">
                            <a href="typologiaAgymn.html">Α' Γυμνασίου</a>
                            <a href="typologiaBgymn.html">Β' Γυμνασίου</a>
                            <a href="typologiaGgymn.html">Γ' Γυμνασίου</a>
                        </div>
                    </div>
                    <div class="nested-menu">
                        <a href="#">Λύκειο ▶</a>
                        <div class="dropdown-content">
                            <a href="typologiaAlyk.html">Α' Λυκείου</a>
                            <a href="typologiaBlyk.html">Β' Λυκείου</a>
                            <a href="typologiaGlyk.html">Γ' Λυκείου</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="dropdown">
                <a class="dropbtn">Προσομοιώσεις ▼</a>
                <div class="dropdown-content">
                    <a href="oscilator.html">Απλή Αρμονική Ταλάντωση</a>
                    <a href="Krouseis.html">Κρούσεις</a>
                    <a href="mag_field.html">Μαγνητικό Πεδίο</a>
                </div>
            </div>
            <a href="#">Έξτρα Υλικό</a>
        </div>

        <h2>Προσομοίωση Ελαστικών Κρούσεων (1D)</h2>
        <div class="controls">
            <div style="grid-column: span 2; display: flex; justify-content: center; gap: 10px;">
                <button id="playBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Play</button>
                <button id="resetBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Reset</button>
            </div>
            <label style="color: blue;">m₁ (kg): <input type="range" id="m1Slider" min="1" max="10" value="2" step="0.5"><span id="m1Val">2.0</span></label>
            <label style="color: blue;">v₁ (m/s): <input type="range" id="v1Slider" min="-5" max="5" value="3" step="0.5"><span id="v1Val">3.0</span></label>
            <label style="color: red;">m₂ (kg): <input type="range" id="m2Slider" min="1" max="10" value="4" step="0.5"><span id="m2Val">4.0</span></label>
            <label style="color: red;">v₂ (m/s): <input type="range" id="v2Slider" min="-5" max="5" value="-1" step="0.5"><span id="v2Val">-1.0</span></label>
        </div>
        <canvas id="simCanvas" width="600" height="300"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const trackY = 180;
        const size = 40;
        let x1, v1, m1, x2, v2, m2, t = 0, isPlaying = false;
        
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const m1Slider = document.getElementById('m1Slider'), v1Slider = document.getElementById('v1Slider');
        const m2Slider = document.getElementById('m2Slider'), v2Slider = document.getElementById('v2Slider');

        function initPhysics() {
            m1 = parseFloat(m1Slider.value); v1 = parseFloat(v1Slider.value);
            m2 = parseFloat(m2Slider.value); v2 = parseFloat(v2Slider.value);
            x1 = 150; x2 = 450; t = 0;
            document.getElementById('m1Val').innerText = m1.toFixed(1);
            document.getElementById('v1Val').innerText = v1.toFixed(1);
            document.getElementById('m2Val').innerText = m2.toFixed(1);
            document.getElementById('v2Val').innerText = v2.toFixed(1);
        }

        playBtn.onclick = () => { isPlaying = !isPlaying; playBtn.innerText = isPlaying ? "Pause" : "Play"; };
        resetBtn.onclick = () => { isPlaying = false; playBtn.innerText = "Play"; initPhysics(); };
        [m1Slider, v1Slider, m2Slider, v2Slider].forEach(slider => slider.oninput = () => { if(!isPlaying) initPhysics(); });

        initPhysics();

        function loop() {
            if (isPlaying) {
                let dt = 0.02;
                x1 += v1 * dt * 20; x2 += v2 * dt * 20; t += dt;
                if (x1 + size >= x2) {
                    x1 = x2 - size;
                    let v1_new = ((m1 - m2) * v1 + 2 * m2 * v2) / (m1 + m2);
                    let v2_new = ((m2 - m1) * v2 + 2 * m1 * v1) / (m1 + m2);
                    v1 = v1_new; v2 = v2_new;
                }
                if (x1 <= 0) { x1 = 0; v1 = -v1; }
                if (x2 + size >= canvas.width) { x2 = canvas.width - size; v2 = -v2; }
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, trackY + size); ctx.lineTo(canvas.width, trackY + size); ctx.stroke();
            ctx.fillStyle = 'blue'; ctx.fillRect(x1, trackY, size, size);
            ctx.fillStyle = 'black'; ctx.fillText("v₁ = " + v1.toFixed(2) + " m/s", x1 + size/2, trackY - 10);
            ctx.fillStyle = 'red'; ctx.fillRect(x2, trackY, size, size);
            ctx.fillText("v₂ = " + v2.toFixed(2) + " m/s", x2 + size/2, trackY - 10);
            ctx.fillText("t = " + t.toFixed(2) + " s", 30, 40);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
